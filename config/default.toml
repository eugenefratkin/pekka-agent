[llm]
base_url    = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
model       = "gpt-4o-mini"

[agent]
model          = "gpt-4o-mini"
max_iterations = 10
system_prompt  = """
You are a helpful assistant. Use the provided tools when you need to perform
calculations or look up information. Think step by step.
"""

# Optional: race N parallel agents; first answer wins.
# [agent.parallel_reasoning]
# num_agents = 3
# strategy   = "first_wins"   # "first_wins" | "majority"

[[tools]]
name        = "calculator"
type        = "builtin"
description = "Evaluates simple arithmetic expressions like '2 + 3 * 4'"

[[tools]]
name        = "echo"
type        = "builtin"
description = "Returns its input text unchanged; useful for testing"

[[tools]]
name        = "perplexity_search"
type        = "builtin"
description = "Search the internet using Perplexity AI for current information, news, and web knowledge"

# Example HTTP tool (not started by default)
